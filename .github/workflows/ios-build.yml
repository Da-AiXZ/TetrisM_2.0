name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Unity Hub
        run: brew install unity-hub

      - name: Install Unity Editor (x86_64 via Rosetta2)
        run: |
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install \
            --version 2021.2.7f1 \
            --changeset 6bd9e232123f \
            --module ios \
            --architecture x86_64 \
            --childModules

      - name: Build Unity (Xcode project)
        run: |
          UNITY="/Applications/Unity/Hub/Editor/2021.2.7f1/Unity.app/Contents/MacOS/Unity"
          "$UNITY" -batchmode -quit -projectPath "$PWD" -buildTarget iOS -executeMethod IOSBuilder.Build -logFile -

      - name: Build unsigned IPA
        run: |
          XCODEPROJ=$(find build -name 'Unity-iPhone.xcodeproj' -type d 2>/dev/null | head -1)
          if [ -z "$XCODEPROJ" ]; then echo "ERROR: No xcodeproj found"; exit 1; fi
          cd "$(dirname "$XCODEPROJ")"
          xcodebuild -project Unity-iPhone.xcodeproj -scheme Unity-iPhone -configuration Release -sdk iphoneos -archivePath build/Unity-iPhone.xcarchive archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO DEVELOPMENT_TEAM=""
          mkdir -p Payload
          cp -r build/Unity-iPhone.xcarchive/Products/Applications/*.app Payload/
          zip -r TetrisM_iOS.ipa Payload
          mkdir -p "$GITHUB_WORKSPACE/build/iOS"
          cp TetrisM_iOS.ipa "$GITHUB_WORKSPACE/build/iOS/"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TetrisM_iOS
          path: build/iOS/TetrisM_iOS.ipa
          retention-days: 7
