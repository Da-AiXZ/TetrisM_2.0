name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Unity Hub
        run: brew install --cask unity-hub

      - name: Install Unity 2022.3.34f1 + iOS Support
        run: |
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install \
            --version 2022.3.34f1 \
            --changeset 1e17368ca73f \
            --module ios
        timeout-minutes: 15

      - name: Build Xcode Project
        run: |
          /Applications/Unity/Hub/Editor/2022.3.34f1/Unity.app/Contents/MacOS/Unity \
            -batchmode \
            -quit \
            -nographics \
            -username "${{ secrets.UNITY_EMAIL }}" \
            -password "${{ secrets.UNITY_PASSWORD }}" \
            -projectPath . \
            -buildTarget iOS \
            -logFile build.log
        timeout-minutes: 20

      - name: Show build log (on failure)
        if: failure()
        run: tail -80 build.log

      - name: Build unsigned IPA
        run: |
          cd build/iOS
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Unity-iPhone.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
          mkdir -p Payload
          cp -r build/Unity-iPhone.xcarchive/Products/Applications/*.app Payload/
          zip -r TetrisM_iOS.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TetrisM_iOS
          path: build/iOS/TetrisM_iOS.ipa
          retention-days: 7
