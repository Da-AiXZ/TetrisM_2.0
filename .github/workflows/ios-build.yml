name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Unity
        run: |
          brew install --cask unity-hub
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install \
            --version 2022.3.34f1 \
            --module ios \
            --childModules

      - name: Activate Unity Personal License
        run: |
          /Applications/Unity/Hub/Editor/2022.3.34f1/Unity.app/Contents/MacOS/Unity \
            -quit -batchmode -nographics \
            -username ${{ secrets.UNITY_EMAIL }} \
            -password ${{ secrets.UNITY_PASSWORD }} \
            -logFile activate.log
          cat activate.log

      - name: Build Xcode Project
        run: |
          /Applications/Unity/Hub/Editor/2022.3.34f1/Unity.app/Contents/MacOS/Unity \
            -quit -batchmode -nographics \
            -projectPath $PWD \
            -buildTarget iOS \
            -executeMethod UnityEditor.BuildPipeline.BuildPlayer \
            -logFile build.log
          cat build.log

      - name: Build unsigned IPA
        run: |
          cd build/iOS
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Unity-iPhone.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
          
          mkdir -p Payload
          cp -r build/Unity-iPhone.xcarchive/Products/Applications/*.app Payload/
          zip -r TetrisM_iOS.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TetrisM_iOS
          path: build/iOS/TetrisM_iOS.ipa
          retention-days: 7
