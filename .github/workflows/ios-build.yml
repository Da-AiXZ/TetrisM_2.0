name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Unity (Xcode project)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: iOS
          unityVersion: 2022.3.34f1
          buildMethod: IOSBuilder.Build

      - name: Build unsigned IPA
        run: |
          XCODEPROJ=$(find build -name 'Unity-iPhone.xcodeproj' -type d | head -1)
          [ -z "$XCODEPROJ" ] && echo "ERROR: No xcodeproj" && exit 1
          cd "$(dirname "$XCODEPROJ")"
          xcodebuild -project Unity-iPhone.xcodeproj -scheme Unity-iPhone -configuration Release -sdk iphoneos -archivePath build/Unity-iPhone.xcarchive archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO DEVELOPMENT_TEAM="" || true
          mkdir -p Payload
          cp -r build/Unity-iPhone.xcarchive/Products/Applications/*.app Payload/
          zip -r "$GITHUB_WORKSPACE/build/iOS/TetrisM_iOS.ipa" Payload
          ls -la "$GITHUB_WORKSPACE/build/iOS/TetrisM_iOS.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TetrisM_iOS
          path: build/iOS/TetrisM_iOS.ipa
          retention-days: 7
