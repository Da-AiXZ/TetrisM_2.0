name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Unity (Xcode project)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: iOS
          unityVersion: 2022.3.34f1
          buildMethod: ''

      - name: Build unsigned IPA
        run: |
          cd build/iOS
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Unity-iPhone.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
          mkdir -p Payload
          cp -r build/Unity-iPhone.xcarchive/Products/Applications/*.app Payload/
          zip -r TetrisM_iOS.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TetrisM_iOS
          path: build/iOS/TetrisM_iOS.ipa
          retention-days: 7

  get-alf:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Install Unity Hub
        run: brew install --cask unity-hub

      - name: Install Unity 2022.3.34f1
        run: |
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install \
            --version 2022.3.34f1 \
            --changeset 1e17368ca73f \
            --architecture arm64
        timeout-minutes: 10

      - name: Generate activation file (.alf)
        run: |
          /Applications/Unity/Hub/Editor/2022.3.34f1/Unity.app/Contents/MacOS/Unity \
            -batchmode \
            -quit \
            -nographics \
            -createManualActivationFile \
            -logFile alf.log
          ls -la Unity_*.alf

      - name: Upload .alf file
        uses: actions/upload-artifact@v4
        with:
          name: Unity_Activation_File
          path: Unity_*.alf
          retention-days: 1
