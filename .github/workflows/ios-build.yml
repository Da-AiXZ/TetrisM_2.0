name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-13
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Unity (Xcode project)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: iOS
          unityVersion: 2021.2.7f1
          buildMethod: IOSBuilder.Build

      - name: Build unsigned IPA
        run: |
          XCODEPROJ=$(find build -name 'Unity-iPhone.xcodeproj' -type d 2>/dev/null | head -1)
          if [ -z "$XCODEPROJ" ]; then
            echo "ERROR: Could not find Unity-iPhone.xcodeproj"
            exit 1
          fi
          echo "Found Xcode project: $XCODEPROJ"
          XCODE_DIR=$(dirname "$XCODEPROJ")
          cd "$XCODE_DIR"
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Unity-iPhone.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
          mkdir -p Payload
          cp -r build/Unity-iPhone.xcarchive/Products/Applications/*.app Payload/
          zip -r TetrisM_iOS.ipa Payload
          ls -la TetrisM_iOS.ipa
          # Copy to artifact path if not already there
          mkdir -p "$GITHUB_WORKSPACE/build/iOS"
          if [ "$(realpath TetrisM_iOS.ipa)" != "$(realpath $GITHUB_WORKSPACE/build/iOS/TetrisM_iOS.ipa)" ]; then
            cp TetrisM_iOS.ipa "$GITHUB_WORKSPACE/build/iOS/"
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TetrisM_iOS
          path: build/iOS/TetrisM_iOS.ipa
          retention-days: 7
